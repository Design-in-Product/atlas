name: Update rainfall data

on:
  schedule:
    # Run daily at 8am Pacific (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest rainfall data
        run: python weather/noaa_rainfall.py --site-json weather/data/rainfall.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet weather/data/rainfall.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated data
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add weather/data/rainfall.json
          git commit -m "Update rainfall data ($(date -u +%Y-%m-%d))"
          git push
