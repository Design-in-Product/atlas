<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Atlas V2: Historical Map Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh; }

#app { display: flex; flex-direction: column; height: 100vh; }

#header {
  background: #16213e;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #0f3460;
  flex-shrink: 0;
}
#header h1 { font-size: 18px; font-weight: 500; color: #e0e0e0; letter-spacing: 1px; }
#header .subtitle { font-size: 12px; color: #888; }

#main { display: flex; flex: 1; min-height: 0; }

#map { flex: 1; background: #0a0a1a; }

#sidebar {
  width: 260px;
  background: #16213e;
  border-left: 1px solid #0f3460;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px;
}

#sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; margin-bottom: 12px; }

.layer-group { margin-bottom: 16px; }
.layer-group label { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; margin-bottom: 6px; }
.layer-group input[type="checkbox"] { accent-color: #e94560; }
.layer-group input[type="range"] { width: 100%; accent-color: #e94560; height: 4px; }
.layer-group .range-label { font-size: 11px; color: #666; display: flex; justify-content: space-between; }
.layer-disabled { opacity: 0.4; pointer-events: none; }

#legend { margin-top: 20px; }
#legend h2 { margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.legend-color { width: 16px; height: 16px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }

#timeline {
  background: #16213e;
  border-top: 1px solid #0f3460;
  padding: 12px 20px;
  flex-shrink: 0;
}

#timeline-top { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }

.timeline-btn {
  background: #0f3460;
  border: 1px solid #e94560;
  color: #e94560;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.timeline-btn:hover { background: #e94560; color: #fff; }
.timeline-btn.active { background: #e94560; color: #fff; }

#speed-controls { display: flex; align-items: center; gap: 8px; }
#speed-controls label { font-size: 11px; color: #888; }
#speed-controls select {
  background: #0f3460;
  color: #e0e0e0;
  border: 1px solid #333;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
}

#date-display {
  font-size: 22px;
  font-weight: 600;
  color: #e94560;
  min-width: 140px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

#timeline-context {
  font-size: 12px;
  color: #888;
  flex: 1;
  text-align: right;
  font-style: italic;
}

#slider-container { position: relative; }
#timeline-slider {
  width: 100%;
  height: 6px;
  accent-color: #e94560;
  cursor: pointer;
}
#keyframe-markers {
  position: relative;
  height: 12px;
  margin-top: 2px;
}
.keyframe-tick {
  position: absolute;
  width: 2px;
  height: 8px;
  background: #e94560;
  opacity: 0.6;
  transform: translateX(-50%);
}
.keyframe-label {
  position: absolute;
  font-size: 9px;
  color: #666;
  transform: translateX(-50%);
  top: 8px;
  white-space: nowrap;
}

.leaflet-container { background: #1a1a2e !important; }
.leaflet-control-attribution { font-size: 9px !important; background: rgba(22,33,62,0.8) !important; color: #666 !important; }
.leaflet-control-attribution a { color: #888 !important; }
.leaflet-control-zoom a { background: #16213e !important; color: #e0e0e0 !important; border-color: #0f3460 !important; }

.empire-tooltip {
  background: rgba(22,33,62,0.95) !important;
  border: 1px solid #e94560 !important;
  color: #e0e0e0 !important;
  font-size: 13px !important;
  padding: 6px 10px !important;
  border-radius: 4px !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important;
}
.empire-tooltip .leaflet-tooltip-arrow { display: none; }

.leaflet-popup-content-wrapper {
  background: rgba(22,33,62,0.95) !important;
  color: #e0e0e0 !important;
  border: 1px solid #0f3460 !important;
  border-radius: 6px !important;
}
.leaflet-popup-tip { background: rgba(22,33,62,0.95) !important; }
.leaflet-popup-close-button { color: #888 !important; }
.popup-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.popup-desc { font-size: 12px; color: #aaa; line-height: 1.4; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div>
      <h1>DYNAMIC ATLAS <span style="font-size:12px;color:#e94560">V2</span></h1>
      <div class="subtitle">Eastern Mediterranean &amp; Middle East, 500 BCE &ndash; 1453 CE</div>
    </div>
  </div>

  <div id="main">
    <div id="map"></div>
    <div id="sidebar">
      <h2>Layers</h2>
      <div class="layer-group">
        <label><input type="checkbox" id="layer-political" checked> Political Boundaries</label>
        <input type="range" id="opacity-political" min="0" max="1" step="0.05" value="0.5">
        <div class="range-label"><span>Transparent</span><span>Opaque</span></div>
      </div>
      <div class="layer-group layer-disabled">
        <label><input type="checkbox" id="layer-religion" disabled> Religious Regions <small>(future)</small></label>
        <input type="range" id="opacity-religion" min="0" max="1" step="0.05" value="0.4" disabled>
      </div>
      <div class="layer-group layer-disabled">
        <label><input type="checkbox" id="layer-trade" disabled> Trade Routes <small>(future)</small></label>
        <input type="range" id="opacity-trade" min="0" max="1" step="0.05" value="0.4" disabled>
      </div>

      <div id="legend">
        <h2>Legend</h2>
        <div id="legend-items"></div>
      </div>
    </div>
  </div>

  <div id="timeline">
    <div id="timeline-top">
      <button class="timeline-btn" id="play-btn" title="Play/Pause">&#9654;</button>
      <div id="speed-controls">
        <label>Speed:</label>
        <select id="speed-select">
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="2">2x</option>
          <option value="3">3x</option>
        </select>
      </div>
      <div id="date-display">500 BCE</div>
      <div id="timeline-context"></div>
    </div>
    <div id="slider-container">
      <input type="range" id="timeline-slider" min="-500" max="1453" value="-500" step="1">
      <div id="keyframe-markers"></div>
    </div>
  </div>
</div>

        coords: [[[2.61,34.42],[2.53,34.49],[2.61,34.49],[2.61,34.42]],[[4.6,34.74],[4.46,34.55],[2.92,34.36],[2.45,34.61],[1.29,34.61],[0.68,34.42],[0.45,34.49],[0.3,34.36],[-0.47,34.36],[-0.68,34.04],[-1.58,33.46],[-1.72,34.68],[-2.11,34.94],[-2.12,35.07],[-1.36,35.26],[-1.14,35.45],[-1.22,35.64],[-1.07,35.58],[-0.92,35.71],[-0.53,35.71],[-0.46,35.84],[0.08,35.84],[0.38,36.22],[0.68,36.29],[0.68,36.42],[0.91,36.35],[1.22,36.55],[2.69,36.61],[3.46,36.87],[3.85,36.8],[4.39,36.93],[4.48,36.67],[4.63,36.61],[4.6,34.74]]]
      },
    ]
  },
];

// MAP INITIALIZATION
// ============================================================

const map = L.map('map', {
  center: [34, 30],
  zoom: 4,
  minZoom: 3,
  maxZoom: 8,
  zoomControl: true,
  attributionControl: true
});

// Use CartoDB Positron (light, minimal) as base
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 20
}).addTo(map);

// Add a labels-only layer on top so labels appear above empire overlays
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 20,
  pane: 'shadowPane' // render above overlays
}).addTo(map);


// ============================================================
// STATE
// ============================================================

let currentLayers = [];
let currentKeyframeIndex = 0;
let isPlaying = false;
let playSpeed = 1;
let animationId = null;
let currentYear = -500;
let targetOpacity = 0.5;
let isTransitioning = false;

const keyframeDates = KEYFRAMES.map(k => k.year);
const minYear = -500;
const maxYear = 1453;

// ============================================================
// KEYFRAME RENDERING
// ============================================================

function clearLayers() {
  currentLayers.forEach(layer => map.removeLayer(layer));
  currentLayers = [];
}

function getKeyframeForYear(year) {
  // Find the keyframe that's closest but not after the current year
  let best = 0;
  for (let i = 0; i < KEYFRAMES.length; i++) {
    if (KEYFRAMES[i].year <= year) best = i;
  }
  return best;
}

function renderKeyframe(index, opacity) {
  clearLayers();
  const kf = KEYFRAMES[index];
  if (!kf) return;

  const legendEl = document.getElementById('legend-items');
  legendEl.innerHTML = '';

  kf.features.forEach(feat => {
    // Convert coords to Leaflet format [lat, lng]
    // Handle both single polygons and MultiPolygons
    let latLngs;
    if (feat.isMulti) {
      // MultiPolygon: array of polygon rings
      latLngs = feat.coords.map(ring => ring.map(c => [c[1], c[0]]));
    } else {
      latLngs = feat.coords[0].map(c => [c[1], c[0]]);
    }

    const polygon = L.polygon(latLngs, {
      color: feat.color,
      fillColor: feat.color,
      fillOpacity: opacity,
      weight: 2,
      opacity: 0.8,
      smoothFactor: 1.5
    });

    // Tooltip on hover
    polygon.bindTooltip(feat.name, {
      className: 'empire-tooltip',
      sticky: true,
      direction: 'top',
      offset: [0, -10]
    });

    // Popup on click
    polygon.bindPopup(
      `<div class="popup-title" style="color:${feat.color}">${feat.name}</div>` +
      `<div class="popup-desc">${feat.desc}</div>`,
      { maxWidth: 280 }
    );

    // Hover effects
    polygon.on('mouseover', function() {
      this.setStyle({ fillOpacity: Math.min(opacity + 0.2, 0.9), weight: 3 });
    });
    polygon.on('mouseout', function() {
      this.setStyle({ fillOpacity: opacity, weight: 2 });
    });

    polygon.addTo(map);
    currentLayers.push(polygon);

    // Legend
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<span class="legend-color" style="background:${feat.color}"></span><span>${feat.name}</span>`;
    legendEl.appendChild(item);
  });

  // Update context
  document.getElementById('timeline-context').textContent = kf.context;
}

// ============================================================
// CROSSFADE TRANSITION
// ============================================================

function transitionToKeyframe(newIndex, duration) {
  if (isTransitioning || newIndex === currentKeyframeIndex) {
    if (newIndex !== currentKeyframeIndex) currentKeyframeIndex = newIndex;
    renderKeyframe(newIndex, targetOpacity);
    return;
  }

  isTransitioning = true;
  duration = duration || 600;
  const halfDur = duration / 2;
  const startTime = performance.now();

  function animateTransition(now) {
    const elapsed = now - startTime;

    if (elapsed < halfDur) {
      // Fade out
      const progress = elapsed / halfDur;
      const opacity = targetOpacity * (1 - progress);
      currentLayers.forEach(layer => {
        layer.setStyle({ fillOpacity: opacity, opacity: 0.8 * (1 - progress) });
      });
      requestAnimationFrame(animateTransition);
    } else if (elapsed < duration) {
      // Swap at midpoint then fade in
      if (currentKeyframeIndex !== newIndex) {
        currentKeyframeIndex = newIndex;
        renderKeyframe(newIndex, 0);
      }
      const progress = (elapsed - halfDur) / halfDur;
      const opacity = targetOpacity * progress;
      currentLayers.forEach(layer => {
        layer.setStyle({ fillOpacity: opacity, opacity: 0.8 * progress });
      });
      requestAnimationFrame(animateTransition);
    } else {
      // Done
      currentKeyframeIndex = newIndex;
      currentLayers.forEach(layer => {
        layer.setStyle({ fillOpacity: targetOpacity, opacity: 0.8 });
      });
      isTransitioning = false;
    }
  }

  requestAnimationFrame(animateTransition);
}

// ============================================================
// TIMELINE CONTROLS
// ============================================================

const slider = document.getElementById('timeline-slider');
const dateDisplay = document.getElementById('date-display');
const playBtn = document.getElementById('play-btn');
const speedSelect = document.getElementById('speed-select');

function formatYear(year) {
  if (year < 0) return `${Math.abs(year)} BCE`;
  if (year === 0) return '1 CE';
  return `${year} CE`;
}

function updateDateDisplay(year) {
  dateDisplay.textContent = formatYear(Math.round(year));
}

// Keyframe tick marks
const markersEl = document.getElementById('keyframe-markers');
KEYFRAMES.forEach(kf => {
  const pct = ((kf.year - minYear) / (maxYear - minYear)) * 100;
  const tick = document.createElement('div');
  tick.className = 'keyframe-tick';
  tick.style.left = pct + '%';
  markersEl.appendChild(tick);

  const lbl = document.createElement('div');
  lbl.className = 'keyframe-label';
  lbl.style.left = pct + '%';
  lbl.textContent = kf.label;
  markersEl.appendChild(lbl);
});

// Slider input
slider.addEventListener('input', function() {
  currentYear = parseInt(this.value);
  updateDateDisplay(currentYear);
  const idx = getKeyframeForYear(currentYear);
  if (idx !== currentKeyframeIndex) {
    transitionToKeyframe(idx, 300);
  }
});

// Play/Pause
playBtn.addEventListener('click', function() {
  isPlaying = !isPlaying;
  this.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
  this.classList.toggle('active', isPlaying);
  if (isPlaying) {
    if (currentYear >= maxYear) {
      currentYear = minYear;
      slider.value = currentYear;
    }
    lastPlayTime = performance.now();
    playAnimation();
  }
});

speedSelect.addEventListener('change', function() {
  playSpeed = parseFloat(this.value);
});

let lastPlayTime = 0;

function playAnimation() {
  if (!isPlaying) return;

  const now = performance.now();
  const delta = now - lastPlayTime;
  lastPlayTime = now;

  // Move ~200 years per second at 1x speed
  const yearsPerMs = 200 / 1000;
  currentYear += delta * yearsPerMs * playSpeed;

  if (currentYear >= maxYear) {
    currentYear = maxYear;
    isPlaying = false;
    playBtn.innerHTML = '&#9654;';
    playBtn.classList.remove('active');
  }

  slider.value = currentYear;
  updateDateDisplay(currentYear);

  const idx = getKeyframeForYear(currentYear);
  if (idx !== currentKeyframeIndex) {
    transitionToKeyframe(idx, 500);
  }

  if (isPlaying) {
    animationId = requestAnimationFrame(playAnimation);
  }
}

// ============================================================
// LAYER CONTROLS
// ============================================================

document.getElementById('layer-political').addEventListener('change', function() {
  const visible = this.checked;
  currentLayers.forEach(layer => {
    if (visible) {
      layer.setStyle({ fillOpacity: targetOpacity, opacity: 0.8 });
    } else {
      layer.setStyle({ fillOpacity: 0, opacity: 0 });
    }
  });
});

document.getElementById('opacity-political').addEventListener('input', function() {
  targetOpacity = parseFloat(this.value);
  const isVisible = document.getElementById('layer-political').checked;
  if (isVisible) {
    currentLayers.forEach(layer => {
      layer.setStyle({ fillOpacity: targetOpacity });
    });
  }
});

// ============================================================
// INITIALIZE
// ============================================================

renderKeyframe(0, targetOpacity);
updateDateDisplay(minYear);
</script>
