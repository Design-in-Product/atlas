<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Atlas: Historical Map Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <!-- Map fills the main area -->
  <div id="main">
    <div id="map"></div>
    <!-- Floating title over map -->
    <div id="map-title">
      <span class="title-text">DYNAMIC ATLAS</span>
      <span class="title-region">Mediterranean to East Asia, 500 BCE &ndash; 1453 CE</span>
    </div>
  </div>

  <!-- Timeline bar at bottom -->
  <div id="timeline">
    <div id="timeline-top">
      <button class="timeline-btn" id="play-btn" title="Play/Pause">&#9654;</button>
      <div id="speed-controls">
        <label>Speed:</label>
        <select id="speed-select">
          <option value="0.25">&frac12;x</option>
          <option value="0.5" selected>1x</option>
          <option value="1">2x</option>
          <option value="1.5">3x</option>
        </select>
      </div>
      <div id="date-display">500 BCE</div>
      <div id="timeline-context"></div>
    </div>
    <div id="slider-container">
      <input type="range" id="timeline-slider" min="-500" max="1453" value="-500" step="1">
      <div id="keyframe-markers"></div>
    </div>
  </div>

  <!-- Floating layers button -->
  <button id="layers-toggle" title="Show Layers">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
      <polyline points="2 17 12 22 22 17"></polyline>
      <polyline points="2 12 12 17 22 12"></polyline>
    </svg>
  </button>

  <!-- Slide-out layers panel -->
  <div id="layers-panel">
    <div class="panel-header">
      <h2>Layers</h2>
      <button id="layers-panel-close" title="Close">&times;</button>
    </div>
    <div class="panel-content">
      <div class="layer-group">
        <label><input type="checkbox" id="layer-political" checked> Political Boundaries</label>
        <input type="range" id="opacity-political" min="0" max="1" step="0.05" value="0.5">
        <div class="range-label"><span>Transparent</span><span>Opaque</span></div>
      </div>
      <div class="layer-group">
        <label><input type="checkbox" id="layer-religion"> Religion</label>
        <input type="range" id="opacity-religion" min="0" max="1" step="0.05" value="0.2">
        <div class="range-label"><span>Transparent</span><span>Opaque</span></div>
      </div>
      <div class="layer-group">
        <label><input type="checkbox" id="layer-language"> Language</label>
        <input type="range" id="opacity-language" min="0" max="1" step="0.05" value="0.15">
        <div class="range-label"><span>Transparent</span><span>Opaque</span></div>
      </div>
      <div class="layer-group">
        <label><input type="checkbox" id="layer-trade"> Trade Routes</label>
        <input type="range" id="opacity-trade" min="0" max="1" step="0.05" value="1.0">
        <div class="range-label"><span>Transparent</span><span>Opaque</span></div>
      </div>

      <hr style="border-color: #0f3460; margin: 12px 0;">

      <div class="layer-group layer-reference">
        <label><input type="checkbox" id="layer-modern"> Modern Borders <small>(reference)</small></label>
        <input type="range" id="opacity-modern" min="0" max="1" step="0.05" value="0.3">
        <div class="range-label"><span>Transparent</span><span>Opaque</span></div>
      </div>

      <div class="panel-legends">
        <div id="political-legend">
          <h3>Political</h3>
          <div id="legend-items"></div>
        </div>

        <div id="religion-legend" style="display:none;">
          <h3>Religion</h3>
          <div id="religion-legend-items"></div>
        </div>

        <div id="language-legend" style="display:none;">
          <h3>Language</h3>
          <div id="language-legend-items"></div>
        </div>

        <div id="trade-legend" style="display:none;">
          <h3>Trade Routes</h3>
          <div id="trade-legend-items"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- External dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Data -->
<script src="keyframes.js"></script>
<script src="transitions.js"></script>
<script src="religion-keyframes.js"></script>
<script src="trade-route-keyframes.js"></script>
<script src="language-keyframes.js"></script>

<!-- Application logic (load order matters) -->
<script src="main.js"></script>
<script src="renderer.js"></script>
<script src="morphing.js"></script>
<script src="timeline.js"></script>
<script src="controls.js"></script>
</body>
</html>
